name: 図書館状況チェック

on:
  schedule:
    - cron: '0 22 * * *'   # 毎日 7:00 JST (UTC 22:00)
  workflow_dispatch:         # GitHub画面から手動実行も可能

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6

      - name: Install dependencies
        working-directory: library-traverse
        run: uv sync

      - name: Install Playwright Chromium
        working-directory: library-traverse
        run: uv run playwright install chromium --with-deps

      - name: Create config.yaml from secret
        working-directory: library-traverse
        run: echo "${{ secrets.CONFIG_YAML }}" > config.yaml

      - name: Run library check
        working-directory: library-traverse
        run: uv run library-traverse --detail --html _site/index.html
        continue-on-error: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: library-traverse/_site

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
