name: 図書館状況チェック

on:
  schedule:
    - cron: '0 22 * * *'   # 毎日 7:00 JST (UTC 22:00)
  workflow_dispatch:         # GitHub画面から手動実行も可能

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6

      - name: Install dependencies
        working-directory: library-traverse
        run: uv sync

      - name: Install Playwright Chromium
        working-directory: library-traverse
        run: uv run playwright install chromium --with-deps

      - name: Create config.yaml from secret
        working-directory: library-traverse
        run: |
          cat <<'YAML_EOF' > config.yaml
          ${{ secrets.CONFIG_YAML }}
          YAML_EOF

      - name: Check connectivity
        run: |
          curl -s -o /dev/null -w "yokohama: %{http_code}\n" \
            "https://opac.lib.city.yokohama.lg.jp/winj/opac/login.do?lang=ja" || echo "yokohama: 接続失敗"
          curl -s -o /dev/null -w "kanagawa_pref: %{http_code}\n" \
            "https://www.klnet.pref.kanagawa.jp/winj/opac/login.do?lang=ja" || echo "kanagawa_pref: 接続失敗"

      - name: Run library check
        working-directory: library-traverse
        run: uv run library-traverse --detail --html _site/index.html
        continue-on-error: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: library-traverse/_site

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
